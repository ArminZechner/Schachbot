<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="Cascadia Code, Consolas, monospace">
  <defs>
    <linearGradient id="cbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1311"/>
      <stop offset="100%" stop-color="#070b0a"/>
    </linearGradient>
    <radialGradient id="vig" cx="50%" cy="45%" r="75%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#cbg)"/>
  <!-- editor gutter -->
  <rect x="0" y="0" width="58" height="720" fill="#0a100e"/>
  <line x1="58" y1="0" x2="58" y2="720" stroke="#1b2420" stroke-width="1"/>

  <!-- line numbers -->
  <g fill="#36443b" font-size="19" text-anchor="end">
    <text x="44" y="56">1</text><text x="44" y="94">2</text><text x="44" y="132">3</text>
    <text x="44" y="170">4</text><text x="44" y="208">5</text><text x="44" y="246">6</text>
    <text x="44" y="284">7</text><text x="44" y="322">8</text><text x="44" y="360">9</text>
    <text x="44" y="398">10</text><text x="44" y="436">11</text><text x="44" y="474">12</text>
    <text x="44" y="512">13</text><text x="44" y="550">14</text><text x="44" y="588">15</text>
    <text x="44" y="626">16</text><text x="44" y="664">17</text>
  </g>

  <!-- faint syntax-coloured code -->
  <g font-size="25" opacity="0.6">
    <text x="78"  y="56"  fill="#e8b04b">def main_loop():</text>
    <text x="118" y="94"  fill="#9fb0a0">gantry.update_motors()</text>
    <text x="118" y="132" fill="#9fb0a0">wifi.keep_alive()</text>
    <text x="118" y="170" fill="#5d7a5f"># collect a full move from the keypad</text>
    <text x="118" y="208" fill="#e8b04b">if buffer.is_full():</text>
    <text x="158" y="246" fill="#9fb0a0">move = chess.validate(start, target)</text>
    <text x="158" y="284" fill="#e8b04b">if move.legal:</text>
    <text x="198" y="322" fill="#9fb0a0">board.apply(move)</text>
    <text x="198" y="360" fill="#9fb0a0">display.redraw()</text>
    <text x="158" y="398" fill="#5d7a5f"># ask Stockfish for the best reply</text>
    <text x="198" y="436" fill="#9fb0a0">fen  = board_to_fen(board, turn)</text>
    <text x="198" y="474" fill="#5fd0bf">best = stockfish(fen, depth=15)</text>
    <text x="198" y="512" fill="#5fd0bf">return best        # e.g. "e7e5"</text>
    <text x="158" y="550" fill="#e8b04b">else:</text>
    <text x="198" y="588" fill="#9fb0a0">display.show_error(reason)</text>
    <text x="118" y="626" fill="#5d7a5f"># weave the magnet between the pieces</text>
    <text x="118" y="664" fill="#9fb0a0">gantry.drag(start, target)</text>
  </g>

  <rect width="1280" height="720" fill="url(#vig)"/>
</svg>
